<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuponera del Barrio</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a href="/" class="nav__logo">Cuponera <span>del Barrio</span></a>
    <div class="nav__links">
      <a href="/login" class="btn btn--secondary btn--sm">Panel de negocios</a>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <h1>Ofertas de hoy</h1>
    <p>Cupones activos de los negocios del barrio</p>
  </div>

  <div id="feed" class="feed">
    <div class="spinner"></div>
  </div>
</main>

<!-- Modal de escáner QR -->
<div class="modal-overlay" id="scanner-overlay">
  <div class="modal">
    <h2 class="modal__title">Escanear cupón</h2>
    <p style="color:var(--text-muted);font-size:.95rem;margin-bottom:1rem;">
      Apuntá la cámara al código QR que te muestra el vendedor.
    </p>
    <div id="scanner-container" style="position:relative;width:100%;aspect-ratio:1;max-height:70vw;background:#000;border-radius:var(--radius-sm);overflow:hidden;touch-action:none;">
      <video id="qr-video" style="width:100%;height:100%;object-fit:cover;" playsinline></video>
      <canvas id="qr-canvas" style="display:none;"></canvas>
      <div id="scan-line" style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);animation:scanLine 2s linear infinite;"></div>
    </div>
    <div id="scan-result" style="margin-top:1rem;display:none;"></div>
    <div class="modal__actions">
      <button class="btn btn--secondary btn--full" onclick="cerrarScanner()">Cancelar</button>
    </div>
  </div>
</div>

<style>
@keyframes scanLine {
  0% { top: 0; } 100% { top: calc(100% - 2px); }
}
</style>

<script src="/static/js/feed.js"></script>
<script src="/static/js/scanner.js"></script>
</body>
</html>
